<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - 13-Day Stories</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #12091A 0%, #1C0F29 50%, #2A1F3D 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #6E45CF 0%, #9D7AE8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 16px;
      color: #e0e0e0;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #9D7AE8;
      background: rgba(255, 255, 255, 0.15);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-button {
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, #6E45CF 0%, #9D7AE8 100%);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(110, 69, 207, 0.3);
    }

    .submit-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(110, 69, 207, 0.4);
    }

    .submit-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      text-align: center;
      font-size: 14px;
    }

    .message.success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.5);
      color: #81c784;
    }

    .message.error {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.5);
      color: #ef5350;
    }

    .footer {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      color: #888;
      font-size: 14px;
    }

    .footer a {
      color: #9D7AE8;
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">13-Day Stories</div>
      <h1>Contact Us</h1>
      <p class="subtitle">Have a question or feedback? We'd love to hear from you!</p>
    </div>

    <div id="message-container"></div>

    <form id="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What is this about?" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
      </div>

      <button type="submit" class="submit-button" id="submit-button">
        Send Message
      </button>
    </form>

    <div class="footer">
      <p>
        <a href="/">Home</a> | 
        <a href="/privacy">Privacy Policy</a> |
        <a href="/contact">Contact</a>
      </p>
      <p style="margin-top: 12px;">© 2025 13-Day Stories. All rights reserved.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const messageContainer = document.getElementById('message-container');
    const submitButton = document.getElementById('submit-button');

    function showMessage(text, type) {
      messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
      messageContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(form);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        subject: formData.get('subject'),
        message: formData.get('message'),
      };

      submitButton.disabled = true;
      submitButton.textContent = 'Sending...';

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        if (response.ok) {
          showMessage('Thank you! Your message has been sent. We\'ll get back to you soon.', 'success');
          form.reset();
        } else {
          showMessage(result.error || 'Something went wrong. Please try again later.', 'error');
        }
      } catch (error) {
        showMessage('Unable to send message. Please check your connection and try again.', 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
