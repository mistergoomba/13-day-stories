<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>13-Day Stories - Download the App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #12091a 0%, #1c0f29 50%, #2a1f3d 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        width: 100%;
        text-align: center;
      }

      .logo {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #6e45cf 0%, #9d7ae8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 16px;
        color: #ffffff;
      }

      p {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 40px;
        color: #e0e0e0;
      }

      .download-buttons {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 40px;
      }

      .download-button {
        display: inline-block;
        padding: 16px 32px;
        background: linear-gradient(135deg, #6e45cf 0%, #9d7ae8 100%);
        color: #ffffff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(110, 69, 207, 0.3);
      }

      .download-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(110, 69, 207, 0.4);
      }

      .download-button:active {
        transform: translateY(0);
      }

      .download-button.disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
        box-shadow: none;
      }

      .download-button.disabled:hover {
        transform: none;
        box-shadow: none;
      }

      .coming-soon {
        font-size: 14px;
        color: #888;
        margin-top: 8px;
      }

      .footer {
        margin-top: 60px;
        padding-top: 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: #888;
        font-size: 14px;
      }

      .footer a {
        color: #9d7ae8;
        text-decoration: none;
        margin: 0 8px;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">13-Day Stories</div>
      <h1>Download the App</h1>
      <p>
        Experience the Mayan calendar journey on your mobile device. Download the app to explore the
        13-day trecenas and discover your daily story.
      </p>

      <div class="download-buttons">
        <a href="#" class="download-button disabled">
          Download for iOS
          <div class="coming-soon">Coming Soon</div>
        </a>
        <a href="#" class="download-button disabled">
          Download for Android
          <div class="coming-soon">Coming Soon</div>
        </a>
      </div>

      <div class="footer">
        <p>
          <a href="/privacy">Privacy Policy</a>
        </p>
        <p style="margin-top: 12px">© 2025 13-Day Stories. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
